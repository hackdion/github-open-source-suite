name: "Bug report"
description: "Report a reproducible bug in {{PROJECT_NAME}}"
title: "[Bug]: "
labels:
  - "bug"
body:
  - type: textarea
    id: summary
    attributes:
      label: "What happened?"
      description: "Describe the bug and what you expected instead."
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: "Steps to reproduce"
      description: "List the smallest set of steps that reproduces the issue."
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: "Version or commit"
      description: "Share the version, tag, or commit if known."
  - type: textarea
    id: environment
    attributes:
      label: "Environment"
      description: "OS, runtime, package manager, or other relevant environment details."
  - type: textarea
    id: notes
    attributes:
      label: "Additional context"
      description: "Logs, screenshots, or other details."

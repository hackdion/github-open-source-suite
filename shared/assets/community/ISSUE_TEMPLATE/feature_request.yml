name: "Feature request"
description: "Suggest an improvement for {{PROJECT_NAME}}"
title: "[Feature]: "
labels:
  - "enhancement"
body:
  - type: textarea
    id: problem
    attributes:
      label: "What problem are you trying to solve?"
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: "What would you like to happen?"
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: "What alternatives have you considered?"
  - type: textarea
    id: notes
    attributes:
      label: "Additional context"
